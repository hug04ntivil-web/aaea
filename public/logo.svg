  <!-- Wheels -->
  <circle cx="19" cy="38" r="5" fill="#1e40af"/>
  <circle cx="19" cy="38" r="2.5" fill="white"/>
  <circle cx="39" cy="38" r="5" fill="#1e40af"/>
  <circle cx="39" cy="38" r="2.5" fill="white"/>
  <!-- Checkmark -->
