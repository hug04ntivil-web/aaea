  <!-- Car body -->
  <path d="M10 36 L12 26 L20 22 L38 22 L46 26 L48 36 Z" fill="white" opacity="0.15"/>
  <path d="M12 36 Q12 38 14 38 L44 38 Q46 38 46 36 L46 28 L44 26 L38 24 L20 24 L16 26 L14 28 Z" fill="white"/>
  <!-- Roof -->
